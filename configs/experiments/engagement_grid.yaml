# Engagement grid: does AGENT-ACTIVATED (progressive-disclosure) delivery close the
# engagement gap that injected delivery left? {7B, 14B} x {off, L1 (injected), agentic}.
# The decisive contrast is agentic vs L1 — same skill content, different delivery — on the
# tasks injected-L1 never flipped (trap-correlation, trap-multiple-comparisons). See the
# Phase-5 result (PR #12) and ROADMAP §5.
#
#   python scripts/gen_authored_data.py            # generate the trap CSVs first
#   python scripts/run_matrix.py configs/experiments/engagement_grid.yaml
#
# A run manifest (no `extends`): each cell is a model base + an `arm` whose skills overlay
# is defined once under `arms`. Quote "off" (a bare off is a YAML 1.1 boolean).
trials: 5
baseline_arm: "off"
arms:
  "off": {}
  L1: { mode: curated, resolution: L1, router: forced, library: statistics }
  agentic: { mode: curated, delivery: agentic, resolution: L1, router: forced, library: statistics }
cells:
  - { model: "qwen2.5-coder:7b",  config: trap_7b.yaml,  arm: "off" }
  - { model: "qwen2.5-coder:7b",  config: trap_7b.yaml,  arm: "L1" }
  - { model: "qwen2.5-coder:7b",  config: trap_7b.yaml,  arm: "agentic" }
  - { model: "qwen2.5-coder:14b", config: trap_14b.yaml, arm: "off" }
  - { model: "qwen2.5-coder:14b", config: trap_14b.yaml, arm: "L1" }
  - { model: "qwen2.5-coder:14b", config: trap_14b.yaml, arm: "agentic" }
