# Phase-5 diagnostic grid: {7B, 14B} x {off, L1, L2} on the 5 authored trap tasks.
# Goal: locate a regime where curated skills measurably help — separate "no headroom"
# (model solves the trap unaided) from "knowledge present but unapplied" (L1) vs
# "applied via worked code" (L2). See ROADMAP Phase 5.
#
#   python scripts/gen_authored_data.py            # generate the trap CSVs first
#   python scripts/run_matrix.py configs/experiments/disclosure_grid.yaml
#
# A run manifest (no `extends`): each cell is a model base config + an `arm` whose skills
# overlay is defined once under `arms`. NOTE: quote "off" — a bare off is a YAML 1.1 bool.
trials: 5
baseline_arm: "off"
arms:
  "off": {}
  L1: { mode: curated, resolution: L1, router: forced, library: statistics }
  L2: { mode: curated, resolution: L2, router: forced, library: statistics }
cells:
  - { model: "qwen2.5-coder:7b",  config: trap_7b.yaml,  arm: "off" }
  - { model: "qwen2.5-coder:7b",  config: trap_7b.yaml,  arm: "L1" }
  - { model: "qwen2.5-coder:7b",  config: trap_7b.yaml,  arm: "L2" }
  - { model: "qwen2.5-coder:14b", config: trap_14b.yaml, arm: "off" }
  - { model: "qwen2.5-coder:14b", config: trap_14b.yaml, arm: "L1" }
  - { model: "qwen2.5-coder:14b", config: trap_14b.yaml, arm: "L2" }
